<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lodge Admin | Aloha Crater Lodge</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; }
        .keychain-header { background: #111; border-bottom: 1px solid rgba(255,69,0,0.3); padding: 20px 30px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .keychain-header .logo { color: #ff4500; font-family: Georgia, serif; font-size: 1.4em; letter-spacing: 2px; text-shadow: 0 0 8px rgba(255,69,0,0.4); }
        .keychain-header .logo span { color: #ccc; font-size: 0.65em; display: block; letter-spacing: 1px; margin-top: 2px; }
        .write-btn { display: inline-block; background: #ff4500; color: #fff; padding: 12px 24px; font-weight: bold; text-decoration: none; border-radius: 4px; font-size: 0.9em; letter-spacing: 1px; transition: background 0.2s; }
        .write-btn:hover { background: #e03d00; }
        .keychain-body { max-width: 900px; margin: 40px auto; padding: 0 30px; }
        .keychain-body h2 { color: #ff4500; font-size: 0.8em; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
        .keychain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 40px; }
        .key-link { display: block; background: #2a2a2a; border: 1px solid #444; border-radius: 6px; padding: 16px 20px; text-decoration: none; color: #fff; font-size: 0.9em; font-weight: bold; transition: all 0.2s; }
        .key-link:hover { border-color: #ff4500; box-shadow: 0 0 12px rgba(255,69,0,0.3); color: #ff4500; }
        .key-link span { display: block; color: #888; font-size: 0.78em; font-weight: normal; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="keychain-header">
        <div class="logo">
            ALOHA CRATER LODGE
            <span>Admin Keychain</span>
        </div>
        <a href="#/collections/blog/new" class="write-btn">+ WRITE NEW BLOG POST</a>
    </div>

    <div class="keychain-body">
        <h2>Lodge Keychain</h2>
        <div class="keychain-grid">
            <a href="https://hotels.cloudbeds.com" target="_blank" class="key-link">
                CloudBeds
                <span>Reservation Management</span>
            </a>
            <a href="https://my.starlink.com" target="_blank" class="key-link">
                Starlink
                <span>Network Management</span>
            </a>
            <a href="https://app.netlify.com" target="_blank" class="key-link">
                Netlify Dashboard
                <span>Site & Deployments</span>
            </a>
            <a href="https://www.usgs.gov/volcanoes/kilauea" target="_blank" class="key-link">
                USGS Kīlauea
                <span>Live Volcano Report</span>
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
