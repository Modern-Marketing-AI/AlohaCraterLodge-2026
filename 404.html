<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Off the Trail | Aloha Crater Lodge</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script>
    (function() {
        var path = window.location.pathname.toLowerCase();
        var slugMap = {
            'stargazing':      '#stargazing',
            'packing-list':    '#packing',
            'packing':         '#packing',
            'volcano-update':  '#latest',
            'volcano-updates': '#latest',
            'lava':            '#latest',
            'kilauea':         '#latest',
            'summit':          '#latest',
            'eruption':        '#latest',
            'guide':           '#latest',
            'blog':            '#latest'
        };
        for (var keyword in slugMap) {
            if (path.indexOf(keyword) !== -1) {
                window.location.replace('volcano-guide.html' + slugMap[keyword]);
                break;
            }
        }
    })();
    </script>
</head>
<body>
    <nav>
        <div class="logo">ALOHA CRATER LODGE</div>
    </nav>

    <header class="hero" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('aloha-crater-lodge-rainforest-basecamp-exterior.jpg') center/cover no-repeat; display: flex; align-items: center; justify-content: center; text-align: center; color: white; min-height: 70vh;">
        <div class="hero-content">
            <p style="color: #ff4500; font-size: 0.85rem; font-weight: bold; letter-spacing: 0.15em; margin-bottom: 1rem;">404 — COORDINATES NOT FOUND</p>
            <h1 style="color: #fff; font-size: 2.5rem; margin-bottom: 1rem;">You've Drifted Off The Trail.</h1>
            <p style="color: #ccc; max-width: 480px; margin: 0 auto 2rem;">The coordinates you're looking for don't exist or have been relocated. Let's get you back to Basecamp.</p>
            <a href="index.html" class="btn">Return to Basecamp</a>
            <a href="volcano-guide.html" style="display: inline-block; color: #10b981; border: 1px solid #10b981; padding: 12px 28px; font-weight: bold; text-decoration: none; border-radius: 4px; margin-left: 12px; letter-spacing: 0.04em; transition: all 0.2s;">Volcano Guide</a>
        </div>
    </header>
</body>
</html>
